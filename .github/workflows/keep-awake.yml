name: Keep Streamlit app awake

# Pings the deployed Streamlit Community Cloud app on a schedule so it never
# sits idle long enough to be put to sleep for inactivity.
#
# The app URL is hardcoded below. To point at a different URL without editing
# this file, set a repository variable named STREAMLIT_APP_URL
#   (GitHub repo → Settings → Secrets and variables → Actions → Variables tab);
# when set, it overrides the default.

on:
  schedule:
    # Every 10 minutes. GitHub cron is UTC and best-effort (can lag a few min).
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# If a run is still going when the next fires, skip the new one.
concurrency:
  group: keep-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        env:
          # Default URL; overridden by the STREAMLIT_APP_URL repo variable if set.
          APP_URL: ${{ vars.STREAMLIT_APP_URL || 'https://cotesmkt.streamlit.app/' }}
        run: |
          echo "Pinging $APP_URL"
          # Follow redirects, fail on HTTP errors, retry a few times, cap time.
          code=$(curl -sSL -o /dev/null -w "%{http_code}" \
                   --retry 3 --retry-delay 10 --max-time 60 "$APP_URL")
          echo "HTTP status: $code"
          # Streamlit returns 200 when awake; a sleeping app still returns 200
          # for the wake page, so any 2xx/3xx counts as a successful ping.
          case "$code" in
            2*|3*) echo "App reachable — ping OK." ;;
            *) echo "::error::Unexpected status $code"; exit 1 ;;
          esac
